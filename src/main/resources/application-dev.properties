# Fonte de dados: H2 in-memory (no MySQL required)
spring.datasource.url=jdbc:h2:mem:seagri;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate — H2 dialect auto-detected
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (optional, access at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# SSL disabled for local development
server.ssl.enabled=false

