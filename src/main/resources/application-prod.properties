# Fonte de dados:
spring.datasource.url=${DATASOURCE_URL:jdbc:h2:mem:seagri;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DATASOURCE_USERNAME:sa}
spring.datasource.password=${DATASOURCE_PASSWORD:}

# Override ddl-auto: H2 in-memory needs full create (not update) for proper table ordering
spring.jpa.hibernate.ddl-auto=create

# Server:
server.port=${PORT:9000}

